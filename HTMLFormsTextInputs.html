        <label for=""> 
            <legend>File input</legend>
            <input type="file" name="user-photo" multiple>
        </label>
        <br>

        <label for="">
            <legend>Color input</legend>
            <input type="color" name="color">
        </label>
        <br>

        <label for="">
            <legend>Hidden</legend>
            <input type="hidden" value="Ukraine" name="country">
        </label>
        <br>

        <input type="button" value="Button">
        <input type="image" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQkhc7Acg-F8Wxk5BgHJjDiUp6ZjujU1_RrsQ&s" alt="send">
        <br>

        <fieldset>
            <legend>Radio-btn (choose gender)</legend>
            <label>Male<input type="radio" name="gender" value="Male" checked></label>
            <label>Female<input type="radio" name="gender" value="Female"></label>
            <label>Other<input type="radio" name="gender" value="Other"></label>
        </fieldset>

        <fieldset>
            <legend>Check-box(preferences:)</legend>
            <label><input type="checkbox" name="prefs" value="pets">Pets</label>
            <label><input type="checkbox" name="prefs" value="cars">Cars</label>
            <label><input type="checkbox" name="prefs" value="tech">Tech</label>
        </fieldset>

        <fieldset>
            <legend>Select(fruits):</legend>
            <select name="fruits">
                <option value="banana">banana</option>
                <option value="apple" selected>apple</option>
                <option value="orange">orange</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Select optgroup (Regions)</legend>
            <select>
                <optgroup label="Закарпатська">
                    <option>Ужгород</option>
                    <option>Мукачево</option>
                </optgroup>
            </select>
        </fieldset>

        <label>
            <textarea name="comment" rows="4" cols="50" placeholder="Введіть текст тут">лллл</textarea>
        </label>

        <button type="submit">Send</button>
        <button type="reset">Reset</button>
    </form>
